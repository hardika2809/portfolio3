<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .myh1{
            color: red;
        }
        .myh1:hover{
            color: rgb(42, 134, 38);
        }
        .img{
            width: 200px;
            height: 200px; 
        }
        .div1{
            background-color: rgb(45, 45, 159);
            width: 200px;
            height: 200px;
            margin: 2px;
            transition: 4s;
            transition-timing-function: linear;
        }
    
        
        .div2{
            background-color: rgb(121, 108, 108);
            width: 200px;
        height: 200px;
            margin: 2px;
            transition: 4s;
            transition-timing-function: ease;
        }
        
        .div3{
            background-color: rgb(5, 129, 42);
            
             width: 200px;
        height: 200px;
            margin: 2px;
            transition: 4s;
            transition-timing-function:ease-in;
        }
        
        .div4{
            background-color: rgb(9, 1, 124);
             width: 200px;
        height: 200px;
            margin: 2px;
            transition: 4s;
            transition-timing-function: ease-out;
        }
        
        .div5{
            background-color: rgb(201, 185, 35);
width: 200px;
        height: 200px;
            margin: 2px;
            transition: 4s;
            transition-timing-function: ease-in-out;
        }
        
        .div1:hover{ 
            
            background-color: rgb(121, 34, 34);
            width: 200px;
            transform: rotate(360deg);
        }
            .div2:hover{
            background-color: rgb(18, 153, 38);
            width: 400px;
        transform: scale(1.1);


        }
        .div3:hover{
            background-color: rgb(236, 131, 235);
            width: 400px;
            transform: skew(20deg);
        }
        
.div4:hover{
            background-color: rgb(210, 238, 243);
            width: 400px;
        }
        .div5:hover{
            
            background-color: rgb(42, 85, 66);
            width: 400px;
        }
    </style>
</head>
<body>
    <h1 class="myh1">this is h1 tag</h1>
    <div class="div1">
        <img class="img"
        src="https://cdn.imgbin.com/20/18/25/imgbin-tsurupika-hagemaru-cartoon-pogo-television-boy-eating-JnhaeaDF9YqKgPLUtrQRpNPyq.jpg" alt="">
    </div>
       <div class="div2"></div>
       <div class="div3"></div>
       <div class="div4"></div>
       <div class="div5"></div>
</body>
</html>
