<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .abc {
            background-color: rgb(145, 17, 79);
            width: 200px;
            height: 200px;
             animation-name: myanim;
            animation-duration: 4s;
            animation-delay: 2s;
            animation-direction: reverse;
            animation-iteration-count: infinite;
            
        }

        @keyframes myanim {
            from {
                background-color: rgb(56, 6, 31);
                width: 100px;
            }

            to {
                background-color: rgb(45, 174, 13);
                width: 100px;
            }
        }
    </style>
    </head>

    <body>
        <h1> animation</h1>
        <div class="abc">


        </div>
    </body>

</html>
